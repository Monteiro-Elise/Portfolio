name: Setup Node + npm ci
description: Checkout repo, setup Node, cache npm, install dependencies
runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: 24
    - uses: actions/cache@v4
      with:
        path: |
          ~/.npm
          node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
    - run: npm ci --prefer-offline --no-audit --progress=false

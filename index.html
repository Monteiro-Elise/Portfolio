<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preload" as="image" href="/banner/banner_dark.jpg" />
    <link rel="preload" as="image" href="/banner/banner.jpg" />
    <link rel="preload" as="image" href="/project/compiler_fr.png" />
    <link rel="preload" as="image" href="/project/compiler_en.png" />
  </head>
  <body>
    <script>
      (function () {
        function getLangFromQuery() {
          const params = new URLSearchParams(window.location.search);
          return params.get('lng') || params.get('lang');
        }

        function getLangFromStorage() {
          return localStorage.getItem('i18nextLng');
        }

        function getLangFromNavigator() {
          return navigator.language || navigator.userLanguage;
        }

        const lang =
          getLangFromQuery() ||
          getLangFromStorage() ||
          getLangFromNavigator()?.split('-')[0] ||
          'en';

        document.documentElement.setAttribute('lang', lang);
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
